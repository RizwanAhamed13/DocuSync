worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Upload size cap — must match MAX_UPLOAD_SIZE_MB in docusync
    client_max_body_size 130m;

    # Timeouts: long-running OCR/embedding requests can take 2+ minutes
    proxy_read_timeout    180s;
    proxy_connect_timeout  10s;
    proxy_send_timeout    180s;

    # Compression for API JSON responses
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;

    upstream docusync {
        server docusync:8000;
    }

    server {
        listen 80;
        server_name _;          # accept any hostname / IP

        # All traffic proxied to docusync FastAPI
        location / {
            proxy_pass         http://docusync;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Required for large file uploads
            proxy_request_buffering off;
        }

        # Health endpoint — no logging noise
        location /health {
            proxy_pass         http://docusync/health;
            access_log         off;
        }
    }
}
