services:

  docusync:
    build: .
    container_name: docusync
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./vector_store:/app/vector_store
      - ./document_metadata.db:/app/document_metadata.db
    environment:
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=True
      - OLLAMA_HOST=http://ollama:11434
      - EMBEDDING_MODEL=BAAI/bge-m3
      - EMBEDDING_DEVICE=cuda
      - EMBEDDING_BATCH_SIZE=32
      - OLLAMA_MODEL=llama3.1:70b-q4_0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  ollama_data:
