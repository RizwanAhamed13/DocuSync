services:

  docusync:
    build: .
    container_name: docusync
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./vector_store:/app/vector_store
      - ./document_metadata.db:/app/document_metadata.db
    environment:
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=True
      - EMBEDDING_MODEL=Alibaba-NLP/gte-large-en-v1.5
      - USE_OLLAMA_TAGGING=false
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  docusync-nginx:
    image: nginx:alpine
    container_name: docusync-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d
    depends_on:
      - docusync
