services:

  nginx:
    image: nginx:alpine
    container_name: docusync-nginx
    restart: unless-stopped
    ports:
      - "80:80"           # LAN access: http://GPU_SERVER_IP
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - docusync

  docusync:
    build: .
    container_name: docusync
    restart: unless-stopped
    # No ports exposed to host — only reachable via nginx inside Docker network
    expose:
      - "8000"
    volumes:
      - ./uploads:/app/uploads
      - ./vector_store:/app/vector_store
      - ./document_metadata.db:/app/document_metadata.db
    environment:
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=True
      - OLLAMA_HOST=http://ollama:11434
      - EMBEDDING_MODEL=BAAI/bge-m3
      - EMBEDDING_DEVICE=cuda
      - EMBEDDING_BATCH_SIZE=32
      - OLLAMA_MODEL=llama3.1:8b
      - USE_OLLAMA_TAGGING=true
      - OCR_DEVICE=cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    # Port 11434 NOT exposed to host — only docusync container talks to it
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  ollama_data:
