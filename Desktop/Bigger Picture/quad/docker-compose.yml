version: "3.9"
services:

  quad-engine:
    build: .
    container_name: quad-engine
    restart: unless-stopped
    ports:
      - "8000:8000"       # control plane + proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # Docker-in-host access
      - quad-data:/app/data                          # SQLite + logs
      - quad-projects:/app/projects                  # extracted project files
      - quad-models:/app/models
      - quad-chroma:/app/chroma_db
    environment:
      - DB_PATH=/app/data/quad.db
      - LOG_DIR=/app/data/logs
      - PROJECT_DIR=/app/projects
      - BASE_DOMAIN=${BASE_DOMAIN:-quad.localhost}
      - PORT_RANGE_START=9000
      - PORT_RANGE_END=9999
      - TUNNEL_SERVER_HOST=quad-tunnel-server
      - FRP_SERVER_PORT=7005
      - REDIS_URL=redis://quad-redis:6379/0
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
    depends_on:
      quad-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  quad-redis:
    image: redis:7-alpine
    container_name: quad-redis
    restart: unless-stopped
    volumes:
      - quad-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  quad-ai-worker:
    build: .
    container_name: quad-ai-worker
    command: rq worker quad-ai
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - quad-data:/app/data
      - quad-projects:/app/projects
      - quad-models:/app/models
      - quad-chroma:/app/chroma_db
    environment:
      - REDIS_URL=redis://quad-redis:6379/0
      - DB_PATH=/app/data/quad.db
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
    depends_on:
      quad-redis:
        condition: service_healthy

  quad-tunnel-server:
    build: ./tunnel/server
    container_name: quad-tunnel-server
    restart: unless-stopped
    ports:
      - "7005:7000"     # frpc client connections
      - "7080:7080"     # proxied HTTP traffic
      - "7500:7500"     # frps dashboard API
    environment:
      - FRP_TOKEN=${FRP_TOKEN:-changeme-set-in-env}
    volumes:
      - ./tunnel/server/frps.toml:/etc/frp/frps.toml
      - quad-tunnel-data:/var/log/frp

  quad-nginx:
    image: nginx:alpine
    container_name: quad-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - quad-static:/usr/share/nginx/html

  quad-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quad-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - quad-engine

volumes:
  quad-data:
  quad-projects:
  quad-redis-data:
  quad-static:
  quad-tunnel-data:
  quad-models:
  quad-chroma:
