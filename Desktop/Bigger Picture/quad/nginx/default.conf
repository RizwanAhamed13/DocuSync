server {
    listen 80;
    server_name _;

    # Static apps served by subdirectory /static/<app_name>/
    location /static/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ =404;
    }

    # Everything else → quad-engine proxy
    location / {
        proxy_pass http://quad-engine:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Live tunnel traffic → frp HTTP port
    # Matches subdomains that have an active tunnel record in SQLite
    location @tunnel {
        proxy_pass http://quad-tunnel-server:7080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;   # keep tunnel connections alive
    }
}
